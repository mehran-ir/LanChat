name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pillow comtypes pystray

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name "LanChat by MGH" --hidden-import=PIL._tkinter_finder --collect-submodules comtypes --hidden-import=pystray._win32 main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LanChat-by-MGH-windows-exe
          path: "dist/LanChat by MGH.exe"
